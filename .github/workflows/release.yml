name: release
on:
  push:
    branches:
      - main

jobs:
  stable:
    uses: the-guild-org/shared-config/.github/workflows/release-stable.yml@efca92ebf0309a89e2e1bb69b1f52115ff8ee7d6 # main
    with:
      releaseScript: release
      nodeVersion: 22
    secrets:
      githubToken: ${{ secrets.GUILD_BOT_TOKEN }}
      npmToken: ${{ secrets.NPM_TOKEN }}
